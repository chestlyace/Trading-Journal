<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a24e",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112117",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .geist-mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-md flex flex-col gap-12">
<header class="flex flex-col items-center gap-8">
<div class="flex items-center justify-center gap-3">
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2.5 w-2.5 rounded-full bg-slate-900 dark:bg-white"></div>
</div>
<div class="flex items-center justify-center">
<div class="w-20 h-20 rounded-full bg-primary/10 border-2 border-primary flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'wght' 600">
                        check
                    </span>
</div>
</div>
</header>
<main class="flex flex-col gap-8 text-center">
<div class="space-y-3">
<h1 class="text-4xl font-extrabold tracking-tight text-slate-900 dark:text-white">
                    You're ready.
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-lg leading-relaxed">
                    Your journal is set up and ready to track your performance.
                </p>
</div>
<div class="bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-lg p-6 space-y-4">
<h4 class="text-xs uppercase tracking-widest font-bold text-slate-500 dark:text-slate-500 geist-mono">
                    Journal Summary
                </h4>
<div class="space-y-3">
<div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-800 pb-2">
<span class="text-sm text-slate-500 dark:text-slate-400 geist-mono">Account</span>
<span class="text-sm font-bold text-slate-900 dark:text-white">Funded Live</span>
</div>
<div class="flex justify-between items-center">
<span class="text-sm text-slate-500 dark:text-slate-400 geist-mono">Style</span>
<span class="text-sm font-bold text-slate-900 dark:text-white">Day Trader</span>
</div>
</div>
</div>
</main>
<footer class="flex flex-col gap-4">
<button class="w-full h-14 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-lg transition-transform active:scale-[0.98] flex items-center justify-center gap-2">
                Log your first trade
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<button class="w-full h-14 bg-transparent text-slate-600 dark:text-slate-400 font-medium rounded-lg hover:text-slate-900 dark:hover:text-white transition-colors">
                Go to dashboard
            </button>
</footer>
<div class="mt-12 flex justify-center">
<div class="bg-primary/5 dark:bg-primary/10 px-4 py-2 rounded-full border border-primary/20">
<p class="text-xs font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-sm">security</span>
                    Data synced and encrypted
                </p>
</div>
</div>
</div>
</body></html>
