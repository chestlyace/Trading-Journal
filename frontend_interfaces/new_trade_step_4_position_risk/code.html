<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Trade - Position &amp; Risk</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Geist+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a24e",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112117",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "mono": ["Geist Mono", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .font-mono { font-family: 'Geist Mono', monospace; }
        .font-display { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header Section -->
<header class="flex items-center p-4 pb-2 justify-between border-b border-primary/10">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">New Trade</h2>
</header>
<!-- Progress Section -->
<div class="flex flex-col gap-3 p-6 max-w-2xl mx-auto w-full">
<div class="flex gap-6 justify-between items-center">
<p class="text-primary text-sm font-semibold tracking-wider uppercase">Step 4 of 6</p>
<p class="text-slate-500 dark:text-slate-400 font-mono text-sm tracking-tighter">66%</p>
</div>
<div class="rounded-full bg-primary/10 h-1.5 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 66.6%;"></div>
</div>
</div>
<main class="flex-1 max-w-2xl mx-auto w-full px-6 pb-24">
<div class="pt-8 pb-10">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-extrabold tracking-tight mb-2">Position &amp; Risk</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Define your exposure and risk parameters for this entry.</p>
</div>
<!-- Form Fields -->
<div class="space-y-8">
<!-- Position Size -->
<div class="group">
<label class="flex flex-col gap-2">
<span class="text-xs font-bold uppercase tracking-widest text-primary/80">Position Size</span>
<div class="relative">
<input class="form-input block w-full border-0 border-b-2 border-primary/20 bg-transparent px-0 py-4 font-mono text-3xl focus:border-primary focus:ring-0 transition-colors placeholder:text-slate-300 dark:placeholder:text-slate-700" placeholder="0.0000" type="text" value="1,240.00"/>
<span class="absolute right-0 bottom-4 font-mono text-slate-400 text-sm">USD</span>
</div>
</label>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Stop Loss -->
<div class="group">
<label class="flex flex-col gap-2">
<span class="text-xs font-bold uppercase tracking-widest text-slate-500">Stop Loss</span>
<div class="relative">
<input class="form-input block w-full border-0 border-b-2 border-primary/20 bg-transparent px-0 py-4 font-mono text-2xl focus:border-primary focus:ring-0 transition-colors placeholder:text-slate-300 dark:placeholder:text-slate-700" placeholder="0.00" type="text"/>
<span class="absolute right-0 bottom-4 font-mono text-slate-400 text-xs">-2.5%</span>
</div>
</label>
</div>
<!-- Take Profit -->
<div class="group">
<label class="flex flex-col gap-2">
<span class="text-xs font-bold uppercase tracking-widest text-slate-500">Take Profit</span>
<div class="relative">
<input class="form-input block w-full border-0 border-b-2 border-primary/20 bg-transparent px-0 py-4 font-mono text-2xl focus:border-primary focus:ring-0 transition-colors placeholder:text-slate-300 dark:placeholder:text-slate-700" placeholder="0.00" type="text"/>
<span class="absolute right-0 bottom-4 font-mono text-slate-400 text-xs">+7.0%</span>
</div>
</label>
</div>
</div>
<!-- Fees -->
<div class="group">
<label class="flex flex-col gap-2">
<span class="text-xs font-bold uppercase tracking-widest text-slate-500">Estimated Fees</span>
<div class="relative">
<input class="form-input block w-full border-0 border-b-2 border-primary/20 bg-transparent px-0 py-4 font-mono text-2xl focus:border-primary focus:ring-0 transition-colors placeholder:text-slate-300 dark:placeholder:text-slate-700" placeholder="0.00" type="text" value="0.12"/>
<span class="absolute right-0 bottom-4 font-mono text-slate-400 text-sm">USD</span>
</div>
</label>
</div>
<!-- Risk Summary Card -->
<div class="mt-12 p-6 rounded-xl bg-primary/5 border border-primary/10 flex items-center justify-between">
<div>
<p class="text-[10px] font-bold uppercase tracking-[0.2em] text-primary mb-1">Risk/Reward Ratio</p>
<p class="font-mono text-2xl font-medium">1:2.8</p>
</div>
<div class="text-right">
<p class="text-[10px] font-bold uppercase tracking-[0.2em] text-primary mb-1">Potential Loss</p>
<p class="font-mono text-2xl font-medium text-red-500">-$31.00</p>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom Navigation -->
<footer class="fixed bottom-0 left-0 right-0 p-6 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-primary/10">
<div class="max-w-2xl mx-auto flex gap-4">
<button class="flex-1 py-4 px-6 rounded-lg font-bold text-slate-900 dark:text-slate-100 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                    Back
                </button>
<button class="flex-[2] py-4 px-6 rounded-lg font-bold bg-primary text-white hover:opacity-90 shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                    Continue
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</footer>
</div>
</body></html>
