<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=Geist+Mono:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a24e",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112117",
                    },
                    fontFamily: {
                        "display": ["Geist", "sans-serif"],
                        "mono": ["Geist Mono", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Geist', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .mono-text {
            font-family: 'Geist Mono', monospace;
        }
        /* Removing default shadows for editorial minimalism */
        * {
            box-shadow: none !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation -->
<header class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-white/10 px-4 py-4">
<button class="flex items-center justify-center p-2 -ml-2 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight ml-2">Export Journal</h1>
</header>
<main class="flex-1 overflow-y-auto pb-32">
<!-- Configuration Section -->
<section class="mt-6 px-4">
<h2 class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-4">Configuration</h2>
<!-- Date Range Picker -->
<div class="flex items-center justify-between py-4 border-b border-slate-200 dark:border-white/5">
<span class="text-sm font-medium">Date Range</span>
<button class="flex items-center gap-2 text-primary text-sm font-bold bg-primary/10 px-3 py-1.5 rounded">
                    Last 30 Days
                    <span class="material-symbols-outlined text-sm">expand_more</span>
</button>
</div>
<!-- Account Selection -->
<div class="py-4 border-b border-slate-200 dark:border-white/5">
<span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-3 block">Select Accounts</span>
<div class="space-y-1">
<label class="flex items-center justify-between py-2 group">
<span class="text-sm">Main Trading Account</span>
<input checked="" class="h-5 w-5 rounded border-slate-300 dark:border-white/20 bg-transparent text-primary focus:ring-0 focus:ring-offset-0" type="checkbox"/>
</label>
<label class="flex items-center justify-between py-2 group">
<span class="text-sm">Crypto Portfolio</span>
<input class="h-5 w-5 rounded border-slate-300 dark:border-white/20 bg-transparent text-primary focus:ring-0 focus:ring-offset-0" type="checkbox"/>
</label>
</div>
</div>
<!-- Include Sheets Section -->
<div class="py-4">
<span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-3 block">Include Sheets</span>
<div class="grid grid-cols-1 gap-3">
<label class="flex items-center gap-3 p-3 border border-slate-200 dark:border-white/10 rounded-lg bg-white/5">
<input checked="" class="h-5 w-5 rounded border-slate-300 dark:border-white/20 bg-transparent text-primary focus:ring-0 focus:ring-offset-0" type="checkbox"/>
<span class="text-sm">All Trades</span>
</label>
<label class="flex items-center gap-3 p-3 border border-slate-200 dark:border-white/10 rounded-lg bg-white/5">
<input checked="" class="h-5 w-5 rounded border-slate-300 dark:border-white/20 bg-transparent text-primary focus:ring-0 focus:ring-offset-0" type="checkbox"/>
<span class="text-sm">Performance Summary</span>
</label>
<label class="flex items-center gap-3 p-3 border border-slate-200 dark:border-white/10 rounded-lg bg-white/5">
<input class="h-5 w-5 rounded border-slate-300 dark:border-white/20 bg-transparent text-primary focus:ring-0 focus:ring-offset-0" type="checkbox"/>
<div class="flex flex-col">
<span class="text-sm">AI Insights</span>
<span class="text-[10px] text-primary uppercase font-bold tracking-tighter">Pro Feature</span>
</div>
</label>
</div>
</div>
</section>
<!-- Format Section -->
<section class="mt-8 px-4">
<h2 class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-4">Export Format</h2>
<div class="flex p-1 bg-slate-100 dark:bg-white/5 rounded-lg border border-slate-200 dark:border-white/10">
<button class="flex-1 py-2 text-sm font-bold rounded bg-white dark:bg-white/10 text-slate-900 dark:text-white border border-slate-200 dark:border-white/20">
                    Excel (.xlsx)
                </button>
<button class="flex-1 py-2 text-sm font-medium text-slate-500 dark:text-slate-400">
                    CSV (.csv)
                </button>
</div>
</section>
<!-- Recent Exports -->
<section class="mt-10 px-4">
<div class="flex items-center justify-between mb-4">
<h2 class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Recent Exports</h2>
<button class="text-xs font-bold text-primary">Clear All</button>
</div>
<div class="space-y-4">
<!-- Export Item 1 -->
<div class="flex items-center justify-between p-4 border border-slate-200 dark:border-white/5 rounded-lg">
<div class="flex items-center gap-3">
<div class="p-2 bg-slate-100 dark:bg-white/5 rounded">
<span class="material-symbols-outlined text-slate-500">description</span>
</div>
<div>
<p class="text-sm font-bold">journal_may_24.xlsx</p>
<p class="text-[10px] mono-text text-slate-500 uppercase tracking-tighter">24 MAY 2024 · 1.4 MB</p>
</div>
</div>
<div class="text-right">
<p class="text-xs mono-text font-bold">428 rows</p>
<span class="material-symbols-outlined text-primary text-lg">download</span>
</div>
</div>
<!-- Export Item 2 -->
<div class="flex items-center justify-between p-4 border border-slate-200 dark:border-white/5 rounded-lg">
<div class="flex items-center gap-3">
<div class="p-2 bg-slate-100 dark:bg-white/5 rounded">
<span class="material-symbols-outlined text-slate-500">description</span>
</div>
<div>
<p class="text-sm font-bold">crypto_q1_report.csv</p>
<p class="text-[10px] mono-text text-slate-500 uppercase tracking-tighter">12 APR 2024 · 0.8 MB</p>
</div>
</div>
<div class="text-right">
<p class="text-xs mono-text font-bold">1,120 rows</p>
<span class="material-symbols-outlined text-primary text-lg">download</span>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-200 dark:border-white/10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">ios_share</span>
            GENERATE EXPORT
        </button>
<div class="mt-2 text-center">
<p class="text-[10px] text-slate-500 dark:text-slate-400 uppercase tracking-widest font-medium">Exporting 2 selected accounts</p>
</div>
</div>
</body></html>
