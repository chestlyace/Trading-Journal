<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&amp;family=Geist+Mono:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a24e",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112117",
                    },
                    fontFamily: {
                        "display": ["Manrope"],
                        "mono": ["Geist Mono"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .mono-font {
            font-family: 'Geist Mono', monospace;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Navigation -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-primary/10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold flex-1 text-center pr-10 font-display">New Trade</h2>
</header>
<!-- Progress Section -->
<div class="flex flex-col gap-3 p-6 max-w-2xl mx-auto w-full">
<div class="flex justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium font-display opacity-80">Exit Details</p>
<p class="text-primary text-sm font-bold font-mono">3 / 6</p>
</div>
<div class="h-1.5 w-full rounded-full bg-primary/20">
<div class="h-1.5 rounded-full bg-primary transition-all duration-500" style="width: 50%;"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 max-w-2xl mx-auto w-full px-6 pb-24">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold font-display mb-8">Exit Details</h1>
<div class="space-y-6">
<!-- Exit Date/Time Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider font-display opacity-70">
                    Exit Date &amp; Time
                </label>
<div class="relative group">
<input class="w-full h-14 bg-primary/5 border border-primary/20 rounded-xl px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:opacity-50" placeholder="Oct 24, 2023 - 14:30" type="text" value="Oct 24, 2023 - 14:30"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary/60">calendar_today</span>
</div>
</div>
<!-- Exit Price Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider font-display opacity-70">
                    Exit Price
                </label>
<div class="relative">
<input class="mono-font w-full h-14 bg-primary/5 border border-primary/20 rounded-xl px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="text" value="42,850.40"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary/60">payments</span>
</div>
</div>
<!-- P&L Preview Box -->
<div class="mt-10 p-6 rounded-2xl bg-primary/10 border border-primary/20 relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-6xl">analytics</span>
</div>
<div class="relative z-10">
<p class="text-slate-900 dark:text-slate-100 text-xs font-bold uppercase tracking-widest mb-2 opacity-60">Estimated P&amp;L Preview</p>
<div class="flex items-baseline gap-2">
<span class="mono-font text-4xl font-bold text-primary">+$1,420.50</span>
<span class="mono-font text-primary text-sm font-medium bg-primary/20 px-2 py-0.5 rounded">+3.4%</span>
</div>
<p class="text-slate-900 dark:text-slate-100 text-xs mt-3 font-display opacity-50 italic">Calculated based on entry of $41,430.00</p>
</div>
</div>
</div>
<!-- Next Button -->
<div class="mt-12">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 group shadow-lg shadow-primary/20">
                Continue to Fees
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full bg-background-light dark:bg-background-dark border-t border-primary/10 px-6 py-3 z-50">
<div class="flex justify-between items-center max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Trades</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">query_stats</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Analysis</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Portfolio</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Settings</span>
</a>
</div>
</nav>
</body></html>
