<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;family=Geist+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a24e",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112117",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "mono": ["Geist Mono", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-2xl mx-auto border-x border-primary/10">
<!-- TopAppBar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-6 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-start cursor-pointer" data-icon="arrow_back">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-10">New Trade</h2>
</header>
<!-- Progress Indicator -->
<div class="flex flex-col gap-3 px-6 py-4">
<div class="flex gap-6 justify-between items-end">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold tracking-wide uppercase">Final Review</p>
<p class="text-primary text-xs font-mono font-bold leading-normal">Step 6 of 6</p>
</div>
<div class="rounded-full bg-primary/20 h-1.5 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 100%;"></div>
</div>
</div>
<main class="flex-1 flex flex-col gap-8 p-6">
<!-- Notes Section -->
<section class="flex flex-col gap-3">
<h3 class="text-slate-900 dark:text-slate-100 text-xs font-bold uppercase tracking-widest opacity-60">Trade Rationale</h3>
<div class="flex w-full">
<label class="flex flex-col flex-1">
<textarea class="form-input flex w-full resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-1 focus:ring-primary border border-primary/20 bg-primary/5 focus:border-primary min-h-[160px] placeholder:text-slate-500 dark:placeholder:text-slate-400 p-4 text-base font-normal leading-relaxed transition-all" placeholder="Add your trade rationale..."></textarea>
</label>
</div>
</section>
<!-- Screenshot Upload Section -->
<section class="flex flex-col gap-3">
<h3 class="text-slate-900 dark:text-slate-100 text-xs font-bold uppercase tracking-widest opacity-60">Screenshots</h3>
<div class="flex flex-col items-center justify-center w-full min-h-[120px] rounded-lg border-2 border-dashed border-primary/30 bg-primary/5 hover:bg-primary/10 transition-colors cursor-pointer group">
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-3xl text-primary group-hover:scale-110 transition-transform">photo_camera</span>
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Add screenshots or drag and drop</span>
</div>
</div>
</section>
<!-- Outcome Preview Section -->
<section class="flex flex-col gap-3">
<h3 class="text-slate-900 dark:text-slate-100 text-xs font-bold uppercase tracking-widest opacity-60">Outcome Preview</h3>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1 p-4 rounded-lg bg-primary/5 border border-primary/10">
<p class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Estimated Net P&amp;L</p>
<p class="text-2xl font-mono font-bold text-primary">+$1,420.50</p>
</div>
<div class="flex flex-col gap-1 p-4 rounded-lg bg-primary/5 border border-primary/10">
<p class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Risk : Reward</p>
<p class="text-2xl font-mono font-bold text-slate-900 dark:text-slate-100">1:3.4</p>
</div>
</div>
</section>
</main>
<!-- Bottom CTA -->
<footer class="p-6 sticky bottom-0 bg-background-light dark:bg-background-dark border-t border-primary/10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg transition-colors flex items-center justify-center gap-2 tracking-tight">
<span class="material-symbols-outlined text-xl">check_circle</span>
                Save Trade
            </button>
<p class="text-center text-[10px] text-slate-500 mt-4 uppercase tracking-[0.2em]">All entries are final after saving</p>
</footer>
</div>
</body></html>
